<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiche d'Accueil Sécurité</title>
    <link rel="stylesheet" href="global.css">
      <link rel="stylesheet" href="risk.css">
</head>

<body>
    <div class="container">
        <img class="logo" src="img/CDES_Logo.png" alt="">
        <h1> Fiche d'Accueil Sécurité </h1>
    </div>
  <div id="page4">   
  <div class="container-risk">
    <h2>FORMATION ET SENSIBILISATION AUX RISQUES PROFESSIONNELS</h2>

<div id="postes-container">
  <!-- Premier sélecteur par défaut -->
  <div class="poste-block">
    <label><b>Poste de Travail :</b></label>
    <select class="poste-select">
      <option value="">-- Sélectionner un poste --</option>
      <option value="conducteurs_tp">Conducteurs d’engins TP</option>
      <option value="equipements_fluviaux">Conducteurs équipements fluviaux / maritime</option>
      <option value="marinier">Marinier / Conducteur de Bateaux Freycinet</option>
      <option value="chauffeur_pl">Chauffeur PL / Utilisateur de grue auxiliaire</option>
      <option value="mecanicien">Mécanicien</option>
      <option value="soudeur">Soudeur</option>
      <option value="travaux_forestiers">Travaux forestiers</option>
      <option value="operateurs_polyvalents">Opérateurs polyvalents</option>
      <option value="intervenant_bathy_topo">Intervenant Cellule Bathy / Topo</option>
      <option value="intervenant_tereos">Intervenant TEREOS</option>
    </select>
        <button id="add-poste">+ Ajouter un poste de travail</button>
    <div class="table-container"></div>
  </div>
</div>

    <div class="instructions">
      <p><span class="num">1️⃣</span> Je coche uniquement les risques qui me concernent et dont j’ai lu les documents associés !</p>
      <p><span class="num">2️⃣</span> Je prends connaissance de la fiche de formation qui me concerne !</p>
    </div>

    <div id="tables-container"></div>
  </div>
</div> 
    <button class="next-button" onclick="redirectToInstructionPage()">Suivant</button>
